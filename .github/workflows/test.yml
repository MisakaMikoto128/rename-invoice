name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python test_parser.py

      - name: Verify .ps1 files have UTF-8 BOM
        shell: pwsh
        run: |
          $files = @('install_context.ps1', 'uninstall_context.ps1')
          foreach ($f in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($f)
            if ($bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
              Write-Error "[$f] missing UTF-8 BOM - PowerShell 5.1 will misread Chinese chars"
              exit 1
            }
            Write-Host "[OK] $f has UTF-8 BOM"
          }
